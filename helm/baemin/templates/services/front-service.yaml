apiVersion: v1
kind: Service
metadata:
  name: front-service-active
  namespace: baemin
  labels:
    app: front-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: front-service
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: front-service-preview
  namespace: baemin
  labels:
    app: front-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: front-service
  ports:
    - port: 80
      targetPort: 80