apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: baemin
  labels:
    app: bff-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: bff-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
