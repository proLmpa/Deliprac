# Active service -- receives live traffic
apiVersion: v1
kind: Service
metadata:
  name: bff-service-active
  namespace: baemin
  labels:
    app: bff-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: bff-service
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
---
# Preview service -- points to the new (green) version before promotion
apiVersion: v1
kind: Service
metadata:
  name: bff-service-preview
  namespace: baemin
spec:
  type: ClusterIP
  selector:
    app: bff-service
  ports:
    - port: 8080
      targetPort: 8080