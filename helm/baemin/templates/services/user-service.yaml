apiVersion: v1
kind: Service
metadata:
  name: user-service-active
  namespace: baemin
  labels:
    app: user-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 80
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-canary
  namespace: baemin
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 8081