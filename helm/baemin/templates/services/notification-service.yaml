apiVersion: v1
kind: Service
metadata:
  name: notification-service-active
  namespace: baemin
  labels:
    app: notification-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: 8084
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service-preview
  namespace: baemin
  labels:
    app: notification-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 8084