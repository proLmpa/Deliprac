apiVersion: v1
kind: Service
metadata:
  name: store-service-active
  namespace: baemin
  labels:
    app: store-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: store-service
  ports:
    - name: http
      port: 80
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: store-service-preview
  namespace: baemin
spec:
  type: ClusterIP
  selector:
    app: store-service
  ports:
    - port: 80
      targetPort: 8082