apiVersion: v1
kind: Service
metadata:
  name: order-service-active
  namespace: baemin
  labels:
    app: order-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 80
      targetPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: order-service-preview
  namespace: baemin
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 8083