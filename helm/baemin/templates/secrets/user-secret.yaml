apiVersion: v1
kind: Secret
metadata:
  name: user-secret
  namespace: baemin
  labels:
    {{- include "baemin.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USERNAME:          {{ .Values.secrets.user.dbUser   | quote }}
  DB_PASSWORD:          {{ .Values.secrets.user.dbPass   | quote }}
  BFF_HMAC_USER_SECRET: {{ .Values.secrets.user.hmacUser | quote }}
