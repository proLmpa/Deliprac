{{- if .Values.prometheusOperator.enabled }}
# ServiceMonitor — only rendered when prometheusOperator.enabled=true.
# When false, annotation-based scraping via prometheus-agent is used instead.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bff-service
  namespace: baemin
  labels:
    app: bff-service
    release: prometheus-agent
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: bff-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
{{- end }}
