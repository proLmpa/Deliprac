# ServiceMonitor — requires the Prometheus Operator CRDs.
# Install with: helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack
# If using the prometheus-agent chart's kubernetes_sd_configs instead, this file
# is a no-op until the Operator is present.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bff-service
  namespace: baemin
  labels:
    app: bff-service
    release: prometheus-agent
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: bff-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
