apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: front-service
  namespace: baemin
  labels:
    app: front-service
    {{- include "baemin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: front-service
  strategy:
    blueGreen:
      activeService: front-service-active
      previewService: front-service-preview
      autoPromotionEnabled: false
  template:
    metadata:
      labels:
        app: front-service
    spec:
      containers:
        - name: front-service
          image: "{{ .Values.images.registry }}/front-service:{{ .Values.images.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5