apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-service
  namespace: baemin
  labels:
    app: store-service
    {{- include "baemin.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: store-service
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: store-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8082"
    spec:
      containers:
        - name: store-service
          image: "{{ .Values.images.registry }}/store-service:{{ .Values.images.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: STORE_DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: JWT_SECRET
            - name: BFF_HMAC_STORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: store-secret
                  key: BFF_HMAC_STORE_SECRET
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: redis-config
                  key: REDIS_PORT
            - name: JAVA_OPTS
              value: {{ .Values.javaOpts | quote }}

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 60
            failureThreshold: 120
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
