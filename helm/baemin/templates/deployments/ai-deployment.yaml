apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: baemin
  labels:
    app: ai-service
    {{- include "baemin.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8085"
    spec:
      containers:
        - name: ai-service
          image: "{{ .Values.images.registry }}/ai-service:{{ .Values.images.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: STORE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-urls
                  key: STORE_SERVICE_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-urls
                  key: ORDER_SERVICE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: ANTHROPIC_API_KEY
            - name: BFF_HMAC_AI_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-secret
                  key: BFF_HMAC_AI_SECRET
            - name: BFF_HMAC_STORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: bff-secret
                  key: BFF_HMAC_STORE_SECRET
            - name: BFF_HMAC_ORDER_SECRET
              valueFrom:
                secretKeyRef:
                  name: bff-secret
                  key: BFF_HMAC_ORDER_SECRET
            - name: JAVA_OPTS
              value: {{ .Values.javaOpts | quote }}

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            failureThreshold: 120
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
