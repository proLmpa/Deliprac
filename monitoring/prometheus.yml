global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [localhost:9093]

rule_files:
  - alerting-rules.yml

scrape_configs:
  - job_name: bff-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["${MINIKUBE_IP}:9080"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["${MINIKUBE_IP}:9081"]

  - job_name: store-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["${MINIKUBE_IP}:9082"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["${MINIKUBE_IP}:9083"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["${MINIKUBE_IP}:9084"]
