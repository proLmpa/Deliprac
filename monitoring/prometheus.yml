global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [localhost:9093]

rule_files:
  - alerting-rules.yml

# No scrape_configs here — metrics are pushed by the in-cluster Prometheus Agent
# (helm/prometheus-agent) via remote_write.  This Prometheus instance only needs
# to receive those writes and evaluate alerting rules against the stored data.
#
# To enable receiving, Prometheus must be started with --web.enable-remote-write-receiver
# (already added to start.sh and start.ps1 for local dev).
#
# On vm-monitoring (192.168.160.105), add the flag to the systemd override:
#   /etc/systemd/system/prometheus.service.d/override.conf — append to ExecStart
#   sudo systemctl daemon-reload && sudo systemctl restart prometheus
