groups:
  - name: circuit_breaker
    rules:
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open", name="notification"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is OPEN on {{ $labels.application }}"
          description: >
            The {{ $labels.name }} circuit breaker on {{ $labels.application }} has opened.
            Calls are being short-circuited to the fallback. Check the notification-service.

      - alert: PublicNotificationCircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open", name="publicNotification"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is OPEN on {{ $labels.application }}"
          description: >
            The {{ $labels.name }} circuit breaker on {{ $labels.application }} has opened.
            Public notification reads are being short-circuited to the fallback. Check the notification-service.
