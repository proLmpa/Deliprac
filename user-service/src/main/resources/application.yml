server:
  port: 8081

spring:
  application:
    name: user-service
  mvc:
    problemdetails:
      enabled: true
  profiles:
    default: dev
    group:
      dev:  [pgsql-dev,  jwt-dev]
      test: [pgsql-test, jwt-test]
      prod: [pgsql-prod, jwt-prod]
  config:
    import:
      - "pgsql.yaml"
      - "jwt.yaml"
