server:
  port: 8081

spring:
  application:
    name: user-service
  mvc:
    problemdetails:
      enabled: true
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  profiles:
    default: dev
    group:
      dev:  [pgsql-dev,  jwt-dev,  hmac-dev]
      test: [pgsql-test, jwt-test, hmac-test]
      prod: [pgsql-prod, jwt-prod, hmac-prod]
  config:
    import:
      - "pgsql.yaml"
      - "jwt.yaml"
      - "hmac.yaml"
