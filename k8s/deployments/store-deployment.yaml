apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-service
  namespace: baemin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-service
  template:
    metadata:
      labels:
        app: store-service
    spec:
      containers:
        - name: store-service
          image: prolmpa/store-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: STORE_DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: store-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: store-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: JWT_SECRET
            - name: BFF_HMAC_STORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: store-secret
                  key: BFF_HMAC_STORE_SECRET
