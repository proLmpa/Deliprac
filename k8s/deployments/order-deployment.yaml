apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: baemin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: prolmpa/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: ORDER_DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: order-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: JWT_SECRET
            - name: BFF_HMAC_ORDER_SECRET
              valueFrom:
                secretKeyRef:
                  name: order-secret
                  key: BFF_HMAC_ORDER_SECRET
            - name: JAVA_OPTS
              value: "-Xms32m -Xmx200m"
