services:
  user-db:
    image: postgres:16
    container_name: baemin_user_db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: userpass
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data

  store-db:
    image: postgres:16
    container_name: baemin_store_db
    environment:
      POSTGRES_DB: storedb
      POSTGRES_USER: store_svc
      POSTGRES_PASSWORD: storepass
    ports:
      - "5434:5432"
    volumes:
      - store_db_data:/var/lib/postgresql/data

  order-db:
    image: postgres:16
    container_name: baemin_order_db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order_svc
      POSTGRES_PASSWORD: orderpass
    ports:
      - "5435:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16
    container_name: baemin_notification_db
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: notif_svc
      POSTGRES_PASSWORD: notifpass
    ports:
      - "5436:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.7
    container_name: baemin_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

volumes:
  user_db_data:
  store_db_data:
  order_db_data:
  notification_db_data:
