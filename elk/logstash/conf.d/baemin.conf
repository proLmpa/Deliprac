input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /^\{/ {
    json {
      source  => "message"
      target  => "spring"
      skip_on_invalid_json => true
    }
  }

  if [spring][level] {
    date {
      match   => ["[spring][@timestamp]", "ISO8601"]
      target  => "@timestamp"
      timezone => "UTC"
    }

    mutate {
      rename => {
        "[spring][message]"     => "message"
        "[spring][level]"       => "level"
        "[spring][logger_name]" => "logger"
        "[spring][traceId]"     => "traceId"
        "[spring][service]"     => "service"
        "[spring][stack_trace]" => "stackTrace"
      }
      remove_field => ["spring", "log", "input", "agent", "ecs", "[spring][thread_name]"]
    }
  }
}

output {
  elasticsearch {
    hosts    => ["http://localhost:9200"]
    user     => "logstash_writer"
    password => "${LOGSTASH_ES_PASSWORD}"
    index    => "baemin-%{[service]:-unknown}-%{+YYYY.MM.dd}"
    action   => "index"
  }
}
