<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Public Notifications — Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 960px; margin: 40px auto; padding: 0 24px; color: #222; }
        h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
        h2 { font-size: 1rem; margin: 2rem 0 0.75rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #555; }
        input, textarea { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; margin-bottom: 10px; }
        textarea { resize: vertical; }
        button { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger  { background: #dc2626; color: #fff; }
        .btn-danger:hover  { background: #b91c1c; }
        .btn-secondary { background: #e5e7eb; color: #222; }
        .token-bar { background: #f3f4f6; padding: 12px 16px; border-radius: 6px; margin-bottom: 2rem; }
        .token-bar input { margin-bottom: 0; }
        .msg { font-size: 0.875rem; margin-top: 6px; min-height: 1.2em; }
        .msg.ok  { color: #16a34a; }
        .msg.err { color: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.75rem; font-size: 0.9rem; }
        th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        tr:hover td { background: #f9fafb; }
        .empty { color: #999; font-style: italic; padding: 12px 10px; }
    </style>
</head>
<body>

<h1>Public Notifications — Admin</h1>

<div class="token-bar">
    <label for="token">Access Token (JWT — paste after signing in as ADMIN)</label>
    <input type="text" id="token" placeholder="eyJ..." autocomplete="off" />
</div>

<h2>Create Notification</h2>
<form id="createForm">
    <label for="title">Title</label>
    <input type="text" id="title" placeholder="e.g. Scheduled maintenance on Sunday" required />

    <label for="content">Content</label>
    <textarea id="content" rows="3" placeholder="Describe the notification in detail." required></textarea>

    <label for="expiresAt">Expires at</label>
    <input type="datetime-local" id="expiresAt" required />

    <button type="submit" class="btn-primary">Create</button>
    <div id="createMsg" class="msg"></div>
</form>

<h2>Active Notifications <button class="btn-secondary" style="font-size:0.8rem;padding:4px 10px;margin-left:8px" onclick="load()">Refresh</button></h2>
<table>
    <thead>
        <tr>
            <th style="width:50px">ID</th>
            <th style="width:220px">Title</th>
            <th>Content</th>
            <th style="width:160px">Expires at</th>
            <th style="width:100px"></th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    const $ = id => document.getElementById(id);

    function token() {
        return $('token').value.trim() || localStorage.getItem('accessToken') || '';
    }

    function headers() {
        const t = token();
        return { 'Content-Type': 'application/json', ...(t ? { 'Authorization': 'Bearer ' + t } : {}) };
    }

    async function load() {
        const res = await fetch('/api/public-notifications/list', { method: 'POST', headers: headers() });
        const tbody = $('tbody');
        if (!res.ok) {
            tbody.innerHTML = `<tr><td colspan="5" class="empty">Failed to load (${res.status}). Check your token.</td></tr>`;
            return;
        }
        const list = await res.json();
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">No active notifications.</td></tr>';
            return;
        }
        tbody.innerHTML = list.map(n => `
            <tr>
                <td>${n.id}</td>
                <td>${esc(n.title)}</td>
                <td>${esc(n.content)}</td>
                <td>${new Date(n.expiresAt).toLocaleString()}</td>
                <td><button class="btn-danger" onclick="deactivate(${n.id})">Deactivate</button></td>
            </tr>`).join('');
    }

    async function deactivate(id) {
        if (!confirm(`Deactivate notification #${id}?`)) return;
        const res = await fetch('/api/public-notifications/deactivate', {
            method: 'PUT',
            headers: headers(),
            body: JSON.stringify({ notificationId: id }),
        });
        if (res.ok) load();
        else alert(`Failed (${res.status}).`);
    }

    $('createForm').addEventListener('submit', async e => {
        e.preventDefault();
        const msg = $('createMsg');
        msg.className = 'msg';
        msg.textContent = '';
        const res = await fetch('/api/public-notifications', {
            method: 'POST',
            headers: headers(),
            body: JSON.stringify({
                title:     $('title').value,
                content:   $('content').value,
                expiresAt: new Date($('expiresAt').value).getTime(),
            }),
        });
        if (res.ok) {
            msg.className = 'msg ok';
            msg.textContent = 'Notification created.';
            $('createForm').reset();
            load();
        } else {
            msg.className = 'msg err';
            msg.textContent = `Failed (${res.status}).`;
        }
    });

    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Pre-fill token from localStorage, then load
    const stored = localStorage.getItem('accessToken');
    if (stored) $('token').value = stored;
    load();
</script>
</body>
</html>
